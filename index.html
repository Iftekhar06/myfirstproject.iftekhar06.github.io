<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rock Paper Scissors AI</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #0f172a;
        color: white;
        margin: 0;
        padding: 20px;
    }

    h1 {
        margin-top: 20px;
    }

    .buttons {
        margin-top: 30px;
    }

    button {
        padding: 15px 25px;
        margin: 10px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
    }

    .rock { background: #ef4444; color: white; }
    .paper { background: #3b82f6; color: white; }
    .scissors { background: #22c55e; color: white; }

    .box {
        margin-top: 20px;
        font-size: 18px;
    }

    .score {
        margin-top: 20px;
        font-size: 20px;
        font-weight: bold;
    }
</style>
</head>

<body>

<h1>🎮 Rock Paper Scissors AI</h1>

<div class="buttons">
    <button class="rock" onclick="play('rock')">Rock</button>
    <button class="paper" onclick="play('paper')">Paper</button>
    <button class="scissors" onclick="play('scissors')">Scissors</button>
</div>

<div class="box" id="result">Make your move!</div>
<div class="score" id="score">You: 0 | AI: 0</div>

<script>
let scoreUser = 0;
let scoreAI = 0;

let memory = { rock: 0, paper: 0, scissors: 0 };

function aiMove() {
    let total = memory.rock + memory.paper + memory.scissors;

    if (total === 0) {
        let choices = ["rock", "paper", "scissors"];
        return choices[Math.floor(Math.random() * 3)];
    }

    let predicted = Object.keys(memory).reduce((a, b) =>
        memory[a] > memory[b] ? a : b
    );

    let counter = {
        rock: "paper",
        paper: "scissors",
        scissors: "rock"
    };

    return counter[predicted];
}

function play(user) {
    memory[user]++;

    let ai = aiMove();

    let resultText = "";

    if (user === ai) {
        resultText = "🤝 Tie!";
    } 
    else if (
        (user === "rock" && ai === "scissors") ||
        (user === "paper" && ai === "rock") ||
        (user === "scissors" && ai === "paper")
    ) {
        scoreUser++;
        resultText = "🎉 You Win!";
    } 
    else {
        scoreAI++;
        resultText = "💻 AI Wins!";
    }

    document.getElementById("result").innerText =
        `You: ${user} | AI: ${ai} → ${resultText}`;

    document.getElementById("score").innerText =
        `You: ${scoreUser} | AI: ${scoreAI}`;
}
</script>

</body>
</html>
